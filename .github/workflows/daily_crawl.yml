name: Daily ArXiv Crawl

on:
  schedule:
    - cron: "0 10 * * *"  # 매일 10:00 UTC (= 한국 19:00 KST), 피크 타임 회피
  workflow_dispatch:        # 수동 실행 버튼도 활성화
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/daily_crawl.yml"

permissions:
  issues: write

jobs:
  crawl:
    name: Crawl & Build Graph
    runs-on: self-hosted     # 내 서버의 runner 사용

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      # 1. 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. uv 설치 (서버에 없을 경우 자동 설치)
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # 3. Python 3.12 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 4. 의존성 설치
      - name: Install dependencies
        run: uv sync --frozen

      # 5. 크롤링 실행 (최근 1일치, 최대 500편)
      - name: Run crawl
        run: uv run arxiv-graph crawl --days 2 --max 1000

      # 6. 통계 출력 (Actions 로그에서 확인 가능)
      - name: Print stats
        run: uv run arxiv-graph stats

      # 7. 실패 시 GitHub에 이슈 생성 (선택)
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ArXiv Crawl] Job failed on ${new Date().toISOString().slice(0,10)}`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["bug", "automated"]
            })